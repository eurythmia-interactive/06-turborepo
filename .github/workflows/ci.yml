name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm turbo run db:generate

      - name: Build
        run: pnpm turbo run build

      - name: Lint
        run: pnpm turbo run lint

      - name: Test
        run: pnpm turbo run test

      # TODO: E2E tests disabled due to module resolution issue with @repo/database
      # The package exports TypeScript source with .js extensions (NodeNext), but
      # Vitest can't resolve .js -> .ts at the Node.js ESM loader level.
      # Fix by either building @repo/database or using a different test approach.
      # - name: E2E Tests
      #   run: pnpm --filter @apps/api test:e2e

      - name: Oxlint pre-flight
        run: pnpm lint:ox
