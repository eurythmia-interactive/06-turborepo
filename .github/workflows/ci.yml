name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: turborepo
          POSTGRES_PASSWORD: turborepo
          POSTGRES_DB: turborepo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://turborepo:turborepo@localhost:5432/turborepo_test?schema=public
      DIRECT_URL: postgresql://turborepo:turborepo@localhost:5432/turborepo_test?schema=public
      JWT_SECRET: ci-test-jwt-secret-key-for-testing-only-min-32-chars-long
      CORS_ORIGINS: http://localhost:3000
      COOKIE_SECURE: 'false'
      THROTTLE_TTL: '1'
      THROTTLE_LIMIT: '1000000'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm turbo run db:generate

      - name: Run database migrations
        run: pnpm --filter @repo/database db:migrate:deploy

      - name: Build
        run: pnpm turbo run build

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm turbo run lint

      - name: Unit & Integration Tests
        run: pnpm turbo run test

      - name: E2E Tests
        run: pnpm --filter @apps/api test:e2e

      - name: Oxlint pre-flight
        run: pnpm lint:ox
